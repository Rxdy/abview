name: CI/CD

on:
    push:
        branches: [main, dev]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    packages: write

jobs:
    # ────────────────────────── Phase 1 : LINT ──────────────────────────
    lint-client:
        name: Lint + typecheck client (vue-tsc)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: client/package-lock.json
            - run: npm ci
              working-directory: client
            - run: npm run type-check
              working-directory: client

    lint-server:
        name: Lint + typecheck server (eslint)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: server/package-lock.json
            - run: npm ci
              working-directory: server
            - run: npm run lint
              working-directory: server
            - run: npm run typecheck
              working-directory: server

    # ────────────────────────── Phase 2 : TESTS ─────────────────────────
    test-client:
        name: Tests client (vitest)
        needs: lint-client
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: client/package-lock.json
            - run: npm ci
              working-directory: client
            - run: npm test -- --run
              working-directory: client

    # ─────────────────── Phase 3 : BUILD & PUSH (arm64 → GHCR) ───────────
    build-push:
        name: Build & push ${{ matrix.target }}
        needs: [test-client, lint-server]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                target: [frontend, backend]
        steps:
            - uses: actions/checkout@v4

            - name: Nom du propriétaire en minuscules
              id: owner
              run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

            - uses: docker/setup-qemu-action@v3
            - uses: docker/setup-buildx-action@v3

            - name: Connexion à GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build & push (linux/arm64 pour le Raspberry Pi)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  target: ${{ matrix.target }}
                  platforms: linux/arm64
                  push: true
                  tags: |
                      ghcr.io/${{ steps.owner.outputs.name }}/abview/${{ matrix.target }}:latest
                      ghcr.io/${{ steps.owner.outputs.name }}/abview/${{ matrix.target }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
